<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>📺 PlayID TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { background-color: #111; color: #fff; }
    .channel-card { background: #222; border-radius: 10px; padding: 10px; margin: 5px; text-align: center; cursor: pointer; transition: 0.2s; }
    .channel-card:hover { background: #333; }
    .channel-logo { max-height: 80px; object-fit: contain; margin-bottom: 5px; }
    video { width: 100%; max-height: 60vh; background: #000; }
  </style>
</head>
<body>

  <div class="container mt-3">
    <h2 class="text-center">📺 PlayID TV Live</h2>
    <video id="video" controls autoplay></video>

    <div id="channels" class="row mt-3"></div>
  </div>

  <script>
    const player = document.getElementById("video");
    const channelList = document.getElementById("channels");

    // 📦 เปลี่ยน URL นี้เป็นลิงก์ JSON/W3U ที่คุณต้องการ
    const playlistUrl = "https://playtvthai.github.io/m3u8/playid.json";

    async function loadChannels() {
      const res = await fetch(playlistUrl);
      const data = await res.json();

      data.forEach(channel => {
        const div = document.createElement("div");
        div.className = "col-6 col-sm-4 col-md-3";
        div.innerHTML = `
          <div class="channel-card" onclick="play('${channel.url}')">
            <img class="channel-logo img-fluid" src="${channel.image || ''}" />
            <div>${channel.name}</div>
          </div>
        `;
        channelList.appendChild(div);
      });
    }

    function play(url) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(player);
      } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
        player.src = url;
      } else {
        alert("อุปกรณ์นี้ไม่รองรับ HLS");
      }
    }

    loadChannels();
  </script>
</body>
</html>
