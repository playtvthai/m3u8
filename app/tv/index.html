<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ช่องทีวีออนไลน์</title>
  <meta name="description" content="ดูทีวีออนไลน์แบบ HLS รองรับค้นหา กรองหมวดหมู่ และเพิ่มช่องเองได้" />
  <style>
    :root{
      --primary:#ff5722;
      --secondary:#ff9800;
      --bg:#0e0e10;
      --panel:#1a1a1d;
      --text:#fff;
      --muted:#bdbdbd;
      --radius:14px;
      --ch-size:84px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; overflow:hidden}
    header{padding:14px 16px; background:linear-gradient(90deg,var(--primary),var(--secondary)); font-weight:700; text-align:center}
    .toolbar{display:flex; gap:10px; padding:12px; background:var(--panel); align-items:center; flex-wrap:nowrap}
    .toolbar .categories{display:flex; gap:8px; overflow-x:auto; scrollbar-width:none}
    .toolbar .categories::-webkit-scrollbar{display:none}
    .chip{padding:8px 14px; background:#2a2a2f; border-radius:999px; cursor:pointer; white-space:nowrap; user-select:none; transition:all .2s}
    .chip.active{background:var(--primary); color:#fff; font-weight:700}
    .spacer{flex:1}
    .search{position:relative; min-width:140px}
    .search input{width:100%; padding:10px 12px 10px 36px; background:#111114; border:1px solid #2a2a2f; border-radius:999px; color:#fff; outline:none}
    .search svg{position:absolute; left:10px; top:50%; transform:translateY(-50%)}
    .add-btn{padding:10px 14px; border:0; border-radius:999px; background:#2e7d32; color:#fff; font-weight:700; cursor:pointer}
    .grid{flex:1; overflow:auto; padding:16px; display:grid; gap:16px; grid-template-columns:repeat(auto-fill,minmax(var(--ch-size),1fr)); align-content:start}
    .card{background:#141418; border:1px solid #26262b; border-radius:var(--radius); padding:8px; display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer; transition:transform .15s}
    .card:hover{transform:translateY(-2px)}
    .card img{width:var(--ch-size); height:var(--ch-size); object-fit:cover; border-radius:10px; border:2px solid var(--primary)}
    .name{font-size:13px; text-align:center; max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#eaeaea}
    .muted{color:var(--muted); font-size:12px}
    footer{padding:10px; text-align:center; font-size:12px; color:var(--muted); background:#131316}
    /* Player overlay */
    .player{position:fixed; inset:0; background:#000; display:none; z-index:40}
    .player.active{display:block}
    .player video{width:100%; height:100%}
    .topbar{position:absolute; inset-inline:0; top:0; display:flex; gap:10px; align-items:center; background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent); padding:12px 12px 40px 12px}
    .back{border:0; width:40px; height:40px; border-radius:999px; background:rgba(255,255,255,.12); color:#fff; font-size:18px; cursor:pointer}
    .title{font-weight:700}
    .spinner{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:56px; height:56px; border:5px solid rgba(255,255,255,.25); border-top-color:var(--primary); border-radius:50%; animation:spin 1s infinite linear; display:none}
    .spinner.show{display:block}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    /* Modal */
    .modal{position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.6); z-index:50}
    .modal.active{display:flex}
    .panel{width:min(520px,92vw); background:#121216; border:1px solid #2b2b31; border-radius:16px; padding:16px}
    .panel h3{margin-bottom:10px}
    .row{display:grid; gap:10px; grid-template-columns:1fr}
    .row input,.row select{padding:10px 12px; background:#0f0f13; border:1px solid #2a2a2f; border-radius:10px; color:#fff; outline:none}
    .actions{display:flex; gap:10px; justify-content:flex-end; margin-top:12px}
    .btn{padding:10px 14px; border-radius:10px; border:0; cursor:pointer}
    .btn.ok{background:#2e7d32; color:#fff; font-weight:700}
    .btn.cancel{background:#9e1c1c; color:#fff}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <header>ช่องทีวีออนไลน์</header>

  <div class="toolbar">
    <div class="categories" id="categories">
      <div class="chip active" data-cat="all">ทั้งหมด</div>
      <div class="chip" data-cat="ทีวีดิจิตอล">ทีวีดิจิตอล</div>
      <div class="chip" data-cat="การ์ตูน">การ์ตูน</div>
      <div class="chip" data-cat="sports">กีฬา</div>
      <div class="chip" data-cat="movie">ภาพยนตร์</div>
      <div class="chip" data-cat="news">ข่าว</div>
      <div class="chip" data-cat="entertainment">บันเทิง</div>
      <div class="chip" data-cat="การศึกษา">การศึกษา</div>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 21l-4.3-4.3M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      <input id="search" placeholder="ค้นหาช่อง..." />
    </div>
    <button class="add-btn" id="openAdd">+ เพิ่มช่อง</button>
  </div>

  <div class="grid" id="grid" aria-live="polite"></div>

  <div class="player" id="player">
    <video id="video" controls playsinline></video>
    <div class="topbar">
      <button class="back" id="backBtn" title="ย้อนกลับ">←</button>
      <div class="title" id="nowTitle">กำลังเล่น...</div>
    </div>
    <div class="spinner" id="spinner"></div>
  </div>

  <div class="modal" id="modal">
    <div class="panel">
      <h3>เพิ่มช่องใหม่</h3>
      <div class="row">
        <input id="fName" placeholder="ชื่อช่อง" required />
        <input id="fLogo" placeholder="ลิงก์โลโก้ (ไม่จำเป็น)" />
        <input id="fSrc" placeholder="ลิงก์สตรีม (m3u8)" required />
        <select id="fCat" required>
          <option value="" disabled selected>เลือกหมวดหมู่</option>
          <option value="ทีวีดิจิตอล">ทีวีดิจิตอล</option>
          <option value="sports">กีฬา</option>
          <option value="movie">ภาพยนตร์</option>
          <option value="news">ข่าว</option>
          <option value="entertainment">บันเทิง</option>
          <option value="การศึกษา">การศึกษา</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn cancel" id="cancel">ยกเลิก</button>
        <button class="btn ok" id="save">เพิ่มช่อง</button>
      </div>
    </div>
  </div>

  <footer>© 2025 ช่องทีวีออนไลน์ | พัฒนาโดย KTVHD</footer>

<script>
(() => {
  const grid = document.getElementById('grid');
  const categories = document.getElementById('categories');
  const searchBox = document.getElementById('search');
  const player = document.getElementById('player');
  const video = document.getElementById('video');
  const nowTitle = document.getElementById('nowTitle');
  const spinner = document.getElementById('spinner');
  const backBtn = document.getElementById('backBtn');
  const modal = document.getElementById('modal');
  const openAdd = document.getElementById('openAdd');
  const cancel = document.getElementById('cancel');
  const save = document.getElementById('save');
  const fName = document.getElementById('fName');
  const fLogo = document.getElementById('fLogo');
  const fSrc  = document.getElementById('fSrc');
  const fCat  = document.getElementById('fCat');

  let hls = null;
  let all = [];            // loaded from playlist.json
  let custom = [];         // user-added (persist to localStorage)
  let currentCat = 'all';
  let query = '';

  // Helpers
  const loadJSON = async () => {
    const res = await fetch('playlist.json?cache=' + Date.now());
    if (!res.ok) throw new Error('โหลด playlist.json ไม่สำเร็จ');
    return await res.json();
  };

  const saveCustom = () => localStorage.setItem('customChannels', JSON.stringify(custom));
  const loadCustom = () => {
    try {
      const raw = localStorage.getItem('customChannels');
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  };

  const normalize = s => (s || '').toLowerCase().trim();

  const getFiltered = () => {
    const q = normalize(query);
    const src = [...all, ...custom];
    return src.filter(ch => {
      const catOk = currentCat === 'all' ? true : ch.category === currentCat;
      const qOk = !q ? true : [ch.name, ch.category].some(v => normalize(v).includes(q));
      return catOk && qOk;
    });
  };

  const render = () => {
    const items = getFiltered();
    if (!items.length){
      grid.innerHTML = '<div class="muted">ไม่พบช่องที่ตรงกับการค้นหา</div>';
      return;
    }
    grid.innerHTML = items.map(ch => `
      <div class="card" data-src="${ch.src}" data-name="${ch.name}">
        <img src="${ch.logo || 'https://via.placeholder.com/84?text=No+Logo'}" alt="${ch.name}" onerror="this.src='https://via.placeholder.com/84?text=No+Logo'"/>
        <div class="name" title="${ch.name}">${ch.name}</div>
        <div class="muted">${ch.category || ''}</div>
      </div>
    `).join('');
  };

  const play = (src, name) => {
    player.classList.add('active');
    nowTitle.textContent = name || 'กำลังเล่น...';
    spinner.classList.add('show');

    if (hls) { hls.destroy(); hls = null; }
    video.pause();
    video.removeAttribute('src');
    video.load();

    if (Hls.isSupported()){
      hls = new Hls();
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play().catch(()=>{});
        spinner.classList.remove('show');
      });
      hls.on(Hls.Events.ERROR, (evt, data) => {
        if (data.fatal){
          switch (data.type){
            case Hls.ErrorTypes.NETWORK_ERROR: hls.startLoad(); break;
            case Hls.ErrorTypes.MEDIA_ERROR: hls.recoverMediaError(); break;
            default: hls.destroy();
          }
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = src;
      video.addEventListener('loadedmetadata', ()=>{
        video.play().catch(()=>{});
        spinner.classList.remove('show');
      }, { once:true });
    } else {
      alert('เบราว์เซอร์ไม่รองรับ HLS');
      spinner.classList.remove('show');
    }
  };

  // Events
  grid.addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    play(card.dataset.src, card.dataset.name);
  });

  categories.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentCat = chip.dataset.cat;
    render();
  });

  searchBox.addEventListener('input', e => {
    query = e.target.value;
    render();
  });

  backBtn.addEventListener('click', () => {
    player.classList.remove('active');
    if (hls) hls.destroy();
    video.pause();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape'){
      if (player.classList.contains('active')) backBtn.click();
      if (modal.classList.contains('active')) modal.classList.remove('active');
    }
  });

  // Modal add
  openAdd.addEventListener('click', ()=> modal.classList.add('active'));
  cancel.addEventListener('click', ()=> modal.classList.remove('active'));
  save.addEventListener('click', () => {
    const name = fName.value.trim();
    const src  = fSrc.value.trim();
    const cat  = fCat.value;
    const logo = fLogo.value.trim();

    if (!name || !src || !cat){
      alert('กรุณากรอกข้อมูลให้ครบถ้วน');
      return;
    }
    custom.push({ name, src, category: cat, logo });
    saveCustom();
    modal.classList.remove('active');
    fName.value = fSrc.value = fLogo.value = '';
    fCat.value = '';
    render();
  });

  // Boot
  (async () => {
    try {
      all = await loadJSON();
      custom = loadCustom();
      render();
    } catch (err){
      grid.innerHTML = '<div class="muted">ไม่สามารถโหลด playlist.json ได้</div>';
      console.error(err);
    }
  })();
})();
</script>
</body>
</html>
